<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chromatic Mastery Prototype</title>
    <script type="module" src="/src/web/main.ts"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Chromatic Mastery</p>
        <h1>Color Studio Prototype</h1>
        <p class="subhead">Solve station puzzles, free pets, and relight the studio.</p>
      </header>

      <main class="layout">
        <section class="canvas-panel">
          <canvas id="studio-canvas" width="1000" height="540" aria-label="Studio map"></canvas>
        </section>

        <section class="control-panel">
          <div class="panel-card progress-card">
            <h2>Progress</h2>
            <pre id="progress"></pre>
          </div>

          <div class="panel-card">
            <h2>Puzzles</h2>
            <div id="puzzle-list" class="puzzle-list"></div>
          </div>

          <div class="panel-card action-row">
            <button id="auto-solve" class="btn btn-accent">Auto Solve Journey</button>
            <button id="reset" class="btn">Reset Run</button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
