<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chromatic Mastery Prototype</title>
    <script type="module" src="/src/web/main.ts"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Chromatic Mastery</p>
        <h1>Color Studio Prototype</h1>
        <p class="subhead">Solve station puzzles, free pets, and relight the studio.</p>
      </header>

      <main class="layout">
        <section class="canvas-panel">
          <canvas id="studio-canvas" width="1000" height="540" aria-label="Studio map"></canvas>
        </section>

        <section class="control-panel">
          <div class="panel-card progress-card">
            <h2>Progress</h2>
            <div class="hud" id="hud">
              <div class="hud-stat" id="hud-score">
                <div class="hud-stat-value" id="hud-score-value">0</div>
                <div class="hud-stat-label">Score</div>
              </div>
              <div class="hud-stat" id="hud-pets">
                <div class="hud-stat-value" id="hud-pets-value">0/18</div>
                <div class="hud-stat-label">Pets</div>
              </div>
              <div class="hud-stat" id="hud-streak">
                <div class="hud-stat-value" id="hud-streak-value">0</div>
                <div class="hud-stat-label">Best Streak</div>
              </div>
            </div>
            <div class="milestone-badges" id="milestone-badges"></div>
            <pre id="progress"></pre>
          </div>

          <div class="panel-card">
            <h2>Puzzles</h2>
            <div id="puzzle-list" class="puzzle-list"></div>
          </div>

          <div class="panel-card action-row">
            <button id="auto-solve" class="btn btn-accent">Auto Solve Journey</button>
            <button id="reset" class="btn">Reset Run</button>
          </div>
        </section>
      </main>
    </div>
    <div class="toast-container" id="toast-container"></div>
  </body>
</html>
