<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -40 80 80" width="80" height="80">
  <!-- Constancy Chameleon placeholder — replace by adding pet-22 to pets.png sprite sheet -->

  <!-- halo -->
  <circle r="30" fill="#0d9488" opacity="0.13"/>

  <!-- body -->
  <ellipse cx="4" cy="8" rx="21" ry="13" fill="#0d9488"/>
  <!-- warm-cast overlay (left) — represents the colour shift under warm light -->
  <ellipse cx="-8" cy="8" rx="13" ry="10" fill="#f59e0b" opacity="0.32"/>
  <!-- cool-cast overlay (right) — represents the colour shift under cool light -->
  <ellipse cx="16" cy="8" rx="11" ry="8" fill="#3b82f6" opacity="0.28"/>

  <!-- head -->
  <circle cx="-18" cy="-2" r="12" fill="#0d9488"/>

  <!-- eye -->
  <circle cx="-22" cy="-6" r="5" fill="white"/>
  <circle cx="-22" cy="-6" r="3" fill="#134e4a"/>
  <circle cx="-23" cy="-7" r="1" fill="white"/>

  <!-- snout hint -->
  <path d="M-28,-1 Q-33,2 -28,5" fill="none" stroke="#0f766e" stroke-width="1.8" stroke-linecap="round"/>

  <!-- dorsal crest -->
  <path d="M-18,-14 Q-10,-23 -2,-14 Q6,-23 10,-14" fill="none" stroke="#0f766e" stroke-width="2" stroke-linecap="round"/>

  <!-- curled tail -->
  <path d="M24,14 Q36,10 38,2 Q40,-8 34,-10 Q28,-12 28,-4" fill="none" stroke="#0d9488" stroke-width="6" stroke-linecap="round"/>

  <!-- front legs -->
  <line x1="-6" y1="20" x2="-10" y2="32" stroke="#0f766e" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="8" y1="20" x2="6" y2="32" stroke="#0f766e" stroke-width="3.5" stroke-linecap="round"/>
</svg>
